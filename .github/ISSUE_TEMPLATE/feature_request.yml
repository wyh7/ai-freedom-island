name: Feature Request
description: Suggest a new tool, agent behavior, or analysis capability
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to AI Freedom Island!

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New tool (simulation behavior)
        - New agent personality
        - New analysis metric (AWI)
        - Audit / explainability
        - New model provider
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see?
      placeholder: Describe the feature clearly
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this important for AI safety research?
      placeholder: What research question does this address?

  - type: textarea
    id: implementation
    attributes:
      label: Implementation idea
      description: How might this be implemented?
      placeholder: Optional sketch of the implementation
